<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Error{% endblock %} — Citify</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eaeaea;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .pin {
      width: 48px;
      height: 60px;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 5rem; color: #e94560; line-height: 1; margin-bottom: 0.5rem; }
    h2 { font-size: 1.4rem; color: #eaeaea; margin-bottom: 1rem; }
    p  { color: #a0a0b0; margin-bottom: 2rem; font-size: 1rem; }
    a  {
      display: inline-block;
      background: #e94560;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
    }
    a:hover { background: #c73550; }
  </style>
</head>
<body>
  <div>
    <svg class="pin" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 2C18 2 8 13 8 26C8 44 32 78 32 78C32 78 56 44 56 26C56 13 46 2 32 2Z" fill="#e94560"/>
      <circle cx="32" cy="26" r="11" fill="#1a1a2e"/>
    </svg>
    {% block content %}{% endblock %}
    <a href="/">← Back to Citify</a>
  </div>
</body>
</html>
